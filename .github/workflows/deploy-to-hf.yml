name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git clone https://huggingface.co/spaces/mr-robot369/indian-road-accident-dashboard hf
          rsync -av --delete --exclude='.git' ./ hf/

          cd hf
          git add .
          git commit -m "Auto deploy from GitHub" || echo "No changes to commit"
          git push https://mr-robot369:${HF_TOKEN}@huggingface.co/spaces/mr-robot369/indian-road-accident-dashboard
